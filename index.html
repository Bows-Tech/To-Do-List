<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="todo.css"/>
</head>
<body>

  <div class="app">

    <header class="app-header">
      <div class="title-wrap">
        <span class="title-paren title-paren--left">(</span>
        <div class="title-lines">
          <div class="title-line1">
            <span class="title-spark">✦</span>
            <span class="title-text1">Mi Lista de</span>
          </div>
          <div class="title-line2">
            <em class="title-text2">Tareas</em>
            <span class="title-paren title-paren--right">)</span>
            <svg class="title-curl" viewBox="0 0 90 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 30 Q45 2 88 16" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round" fill="none"/>
            </svg>
          </div>
        </div>
      </div>
      <p class="date" id="today-date"></p>
    </header>

    <!-- Input de nueva tarea -->
    <div class="input-wrap">
      <input
        type="text"
        id="task-input"
        class="task-input"
        placeholder="Agregar nueva tarea..."
        maxlength="80"
        autocomplete="off"
      />
      <button id="add-btn" class="add-btn" aria-label="Agregar tarea">+</button>
    </div>

    <!-- Filtros -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="pending">Pendientes</button>
      <button class="filter-btn" data-filter="done">Completadas</button>
    </div>

    <!-- Lista de tareas -->
    <ul class="task-list" id="task-list"></ul>

    <!-- Estado vacío -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <p>No hay tareas aquí</p>
    </div>

    <!-- Footer de la app -->
    <footer class="app-footer">
      <span id="count-label">0 tareas pendientes</span>
      <button id="clear-btn" class="clear-btn">Borrar completadas</button>
    </footer>

  </div>

  <script src="todo.js"></script>
</body>
</html>
