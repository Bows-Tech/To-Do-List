<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Lista de Tareas</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;1,700&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app">

    <header class="app-header">
      <!-- Fila 1: ( Mi Lista de ) -->
      <div class="title-row title-row--1">
        <span class="paren paren-left">(</span>
        <span class="title-black">Mi Lista de</span>
        <span class="paren paren-right-top">)</span>
      </div>
      <!-- Fila 2: ✦ · Tareas ) ~~~ -->
      <div class="title-row title-row--2">
        <span class="spark">✦</span>
        <span class="title-red">Tareas</span>
        <span class="paren paren-right-bottom">)</span>
        <svg class="curl" viewBox="0 0 100 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 32 C30 8, 70 4, 96 18" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <p class="date" id="today-date"></p>
    </header>

    <div class="input-wrap">
      <input type="text" id="task-input" class="task-input" placeholder="Agregar nueva tarea..." maxlength="80" autocomplete="off"/>
      <button id="add-btn" class="add-btn" aria-label="Agregar tarea">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="pending">Pendientes</button>
      <button class="filter-btn" data-filter="done">Completadas</button>
    </div>

    <ul class="task-list" id="task-list"></ul>

    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <p>No hay tareas aquí</p>
    </div>

    <footer class="app-footer">
      <span id="count-label">0 tareas pendientes</span>
      <button id="clear-btn" class="clear-btn">Borrar completadas</button>
    </footer>

  </div>

  <script src="main.js"></script>
</body>
</html>
